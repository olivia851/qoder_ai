spring.application.name=evaluation-system
server.servlet.context-path=/evaluation
spring.profiles.active=dev
server.port=8088

# Quartz \u914D\u7F6E
spring.quartz.job-store-type=jdbc
# Quartz\u6A21\u5F0F  \u5355\u5E94\u7528(MONOMER)\u3001\u96C6\u7FA4(CLUSTER)
chamc.quartz.mode=CLUSTER

# Actuator for monitoring and health check
management.endpoints.web.base-path=/mgmt
management.endpoints.web.exposure.include=info,health,prometheus
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.endpoint.health.show-details=ALWAYS
management.metrics.tags.application=${spring.application.name}

# the final file will be /app/${spring.application.name}/logs/${spring.application.name}.log
logging.level.root=INFO
logging.file.path=/app/evaluation-logs/${spring.application.name}/logs
logging.filename=${spring.application.name}
logging.hb.binder=INFO

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

#repository\u548Centity\u626B\u63CF\u8DEF\u5F84
chamc.jpa.scan.repository=citic.famc.evaluation
chamc.jpa.scan.entity=citic.famc.evaluation

spring.jpa.properties.hibernate.integration.envers.enabled=false
spring.jpa.show-sql=false
chamc.lock.enable=true

#\u5F00\u542F\u4EFB\u804C\u4FE1\u606F\u540C\u6B65\u8BBE\u7F6E
chamc.web.sync.job=true
#\u5F00\u542F\u673A\u6784\u9886\u5BFC\u4FE1\u606F\u540C\u6B65\u8BBE\u7F6E
chamc.web.sync.orgLeader=true
#\u5F00\u542F\u6BCF\u5929\u81EA\u52A8\u540C\u6B65\u673A\u6784\u7528\u6237\u4FE1\u606F\u914D\u7F6E
chamc.web.sync.timer.enable=true
#\u8BBE\u7F6E\u5B9A\u65F6\u540C\u6B65\u7684cron\u8868\u8FBE\u5F0F \u6BCF\u5929\u51CC\u66682\u70B9\u540C\u6B65
chamc.web.sync.timer.cron=0 0 2 * * ?

chamc.sys.role.default.enable=true
chamc.sys.role.default.has-role-open-default=true
# \u5DE5\u4F5C\u6D41\u7C7B\u578B\uFF0C\u4E00\u822C\u90FD\u5EFA\u8BAE\u4F7F\u7528chamc
chamc.bpm.type=chamc
# \u79DF\u6237id\uFF0C\u9700\u8981\u7533\u8BF7
chamc.bpm.chamc.tenant-id=pim
# \u65E5\u5FD7\u7EA7\u522B
chamc.bpm.chamc.log-level=basic
# \u914D\u7F6E\u540E\u652F\u6301\u89D2\u8272\u540C\u6B65\u5230\u6D41\u7A0B\u5E73\u53F0\uFF08\u89D2\u8272\u589E\u5220\u6539\u81EA\u52A8\u540C\u6B65\uFF0C\u5168\u90E8\u89D2\u8272\u624B\u52A8\u540C\u6B65\uFF09
chamc.bpm.chamc.sync.type=rest

spring.servlet.multipart.max-file-size=1000MB
spring.servlet.multipart.max-request-size=1000MB

springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.docExpansion=none

#\u5F00\u542FSecurityFilter,\u516C\u53F8\u5B89\u5168\u8981\u6C42 web\u5B89\u5168\u6F0F\u6D1E\u8BF4\u660E https://kb.chamc.com.cn/pages/viewpage.action?pageId=28509315
chamc.sys.security.filter.enable=false
#\u5F00\u542Furl\u52A0\u5BC6
chamc.sys.security.filter.url.enable=true
#\u5F00\u542Fxss
chamc.sys.security.filter.xss.enable=true
#\u5F00\u542Fsql\u6CE8\u5165
chamc.sys.security.filter.sql.enable=true
#\u5F00\u542Fcsrf
chamc.sys.security.filter.csrf.enable=false
chamc.sys.security.filter.csrf.none-csrf-urls=/workflow-page/diagram/**,/process/diagram/**,/page/console/**,/modeler/**,/editor-app/**,/favicon.ico,/codegen/**,/sys/config/getEffective,/h2-console/**,/mgmt/**,/webc/**,/sentry/**,/ops/**
#\u63A5\u53E3\u6700\u5927\u957F\u5EA6
chamc.sys.security.filter.maxParamLength = 50000

filerest.storeType=obs
filerest.preview.appKey=GoJ4eke1yLZNkoBYgs8Vvs13gwE5sP
filerest.preview.appName=dev-platform
filerest.suffix=wps,et

springdoc.packages-to-scan=citic.famc.evaluation

#tomcat\u7684accesslog\u65E5\u5FD7
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%a%{X-Forwarded-For}i%A%F%t"%r"%s%b%D%{x-famc-operator}i%{x-famc-trace-id}o%{referer}i%{User-Agent}i
server.tomcat.basedir=/app/evaluation-logs/${spring.application.name}
#\u521B\u5EFA\u65E5\u5FD7\u6587\u4EF6\u7684\u76EE\u5F55\u3002\u53EF\u4EE5\u76F8\u5BF9\u4E8Etomcat base dir\u6216absolute
server.tomcat.accesslog.directory=logs
server.tomcat.accesslog.prefix=access_log
server.tomcat.accesslog.suffix=.log
server.tomcat.mbeanregistry.enabled=true
server.tomcat.accesslog.condition-unless=PATH-SKIPPED

chamc.security.enable=true

server.error.include-exception=true
server.error.include-message=always
server.forward-headers-strategy=framework

chamc.security.logout-success-url=${chamc.current.service.address}/%23/login
chamc.sys.imitate-login.ret-url=${chamc.current.service.address}/%23/dashboard
chamc.security.ad.url=${chamc.sso.service.address}/ChamcSSO/LoginWin.ashx
chamc.security.ad.ret-url=${chamc.current.service.address}/%23/adLogin

chamc.current.service.address=http://localhost:8088/evaluation
chamc.sso.service.address=https://sso-dev.dv.com
